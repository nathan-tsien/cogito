id: claude-opus-default
applicable_models:
  - "claude-opus-4-6"
  - "claude-opus-4-7"

prompt_framing:
  cache_breakpoint_policy: aggressive
  context_anxiety_mitigation: false

tool_call_parser: anthropic_v1

context_compression:
  max_history_turns: 50
  summarization_threshold_tokens: 16000

retry_policy:
  on_rate_limit: exponential_backoff
  on_context_overflow: compress_and_retry
  on_parse_error: feedback_to_llm
