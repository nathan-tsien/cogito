<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" role="img"
     aria-label="cogito-tui position: cogito-cli and cogito-tui are sibling Surface crates that both consume the same Runtime, which drives the Brain; adding cogito-tui required no protocol or Brain change.">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #1f2328; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    .h1 { font-size: 15px; font-weight: 700; }
    .sub { font-size: 11px; fill: #57606a; }
    .note { font-size: 10.5px; fill: #6e7781; font-style: italic; }
    .grp { font-size: 11px; font-weight: 700; fill: #5a6b8c; letter-spacing: .02em; }
    .card { fill: #f6f8fa; stroke: #d0d7de; }
    .runtime { fill: #e7ebf0; stroke: #7d8590; }
    .brain { fill: #eef1fe; stroke: #4c6ef5; }
    .session { fill: #e6f4ea; stroke: #2da44e; }
    .boundary { fill: #f3eefe; stroke: #8250df; }
    .hands { fill: #fdf3e3; stroke: #d4a72c; }
    .protocol { fill: #e3f1f1; stroke: #1b9e9e; }
    .comp { fill: #ffffff; stroke: #c7d0e0; }
    .flow { stroke: #7d8590; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7d8590"/>
    </marker>
  </defs>

  <rect class="card" x="2" y="2" width="636" height="436" rx="12"/>
  <text class="h1" x="24" y="34">cogito-tui — Position in the Crate Stack</text>
  <text class="note" x="24" y="52">Both Surface crates consume the same Runtime; no protocol or Brain change required to add cogito-tui.</text>

  <!-- Brain at top -->
  <rect class="brain" x="155" y="68" width="230" height="60" rx="8"/>
  <text x="270" y="93" text-anchor="middle" font-size="13" font-weight="700">Brain</text>
  <text class="sub" x="270" y="112" text-anchor="middle">cogito-core::harness</text>

  <!-- Arrow: Runtime -> Brain (upward consumption means Runtime drives Brain, arrow points up) -->
  <line class="flow" x1="270" y1="168" x2="270" y2="128" marker-end="url(#arrow)"/>
  <text class="note" x="278" y="158" font-size="10">consumes</text>

  <!-- Runtime in middle -->
  <rect class="runtime" x="155" y="168" width="230" height="60" rx="8"/>
  <text x="270" y="193" text-anchor="middle" font-size="13" font-weight="700">Runtime</text>
  <text class="sub" x="270" y="212" text-anchor="middle">cogito-core::runtime</text>

  <!-- Arrows: cogito-cli -> Runtime and cogito-tui -> Runtime -->
  <line class="flow" x1="170" y1="296" x2="220" y2="228" marker-end="url(#arrow)"/>
  <line class="flow" x1="370" y1="296" x2="320" y2="228" marker-end="url(#arrow)"/>

  <!-- Surface layer label -->
  <text class="grp" x="270" y="286" text-anchor="middle">Surface layer</text>

  <!-- cogito-cli box -->
  <rect class="runtime" x="60" y="296" width="220" height="60" rx="8"/>
  <text x="170" y="321" text-anchor="middle" font-size="13" font-weight="700">cogito-cli</text>
  <text class="sub" x="170" y="340" text-anchor="middle">CLI surface</text>

  <!-- cogito-tui box -->
  <rect class="runtime" x="300" y="296" width="180" height="60" rx="8"/>
  <text x="390" y="321" text-anchor="middle" font-size="13" font-weight="700">cogito-tui</text>
  <text class="sub" x="390" y="340" text-anchor="middle">TUI surface</text>

  <!-- Note at bottom -->
  <text class="note" x="270" y="400" text-anchor="middle">Both use the same builder pattern and FsStrategyRegistry.</text>
  <text class="note" x="270" y="416" text-anchor="middle">No protocol or Brain change was required to add cogito-tui.</text>
</svg>
