<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" role="img"
     aria-label="H01 Turn Driver calls H03, H10, H11, H04, H05, H06, H07, H08, H09 at defined points; H02 Step Recorder is called by every component.">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #1f2328; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    .h1 { font-size: 15px; font-weight: 700; }
    .sub { font-size: 11px; fill: #57606a; }
    .grp { font-size: 12px; font-weight: 700; fill: #5a6b8c; }
    .note { font-size: 10.5px; fill: #6e7781; font-style: italic; }
    .edge { font-size: 11px; fill: #57606a; }
    .card { fill: #f6f8fa; stroke: #d0d7de; }
    .div  { stroke: #dde3ea; stroke-width: 1; }
    .flow { stroke: #7d8590; stroke-width: 2; fill: none; }
    .brain { fill: #eef1fe; stroke: #4c6ef5; }
    .comp { fill: #ffffff; stroke: #c7d0e0; }
    .h02box { fill: #e3f1f1; stroke: #1b9e9e; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7d8590"/>
    </marker>
  </defs>

  <rect class="card" x="2" y="2" width="816" height="576" rx="12"/>
  <text class="h1" x="24" y="32">H01 Turn Driver &#8212; critical dependency constraints</text>
  <text class="sub" x="24" y="50">H01 is the only coordinator; H02&#8211;H10 never call each other</text>

  <!-- H01 Turn Driver (root) -->
  <rect class="brain" x="310" y="72" width="200" height="46" rx="8"/>
  <text x="324" y="100"><tspan class="mono" font-weight="700" font-size="13" fill="#4c6ef5">H01</tspan><tspan font-size="13"> Turn Driver</tspan></text>

  <!-- Row 1: H03, H10 (on entry) -->
  <rect class="comp" x="80" y="190" width="200" height="46" rx="6"/>
  <text x="94" y="218"><tspan class="mono" font-weight="700" font-size="13" fill="#4c6ef5">H03</tspan><tspan font-size="13"> Resume Coord.</tspan></text>

  <rect class="comp" x="540" y="190" width="200" height="46" rx="6"/>
  <text x="554" y="218"><tspan class="mono" font-weight="700" font-size="13" fill="#4c6ef5">H10</tspan><tspan font-size="13"> Strategy Selector</tspan></text>

  <!-- arrows H01 -> H03, H01 -> H10 -->
  <path class="flow" d="M355,118 L180,190" marker-end="url(#arrow)"/>
  <text class="edge mono" x="198" y="168" text-anchor="middle">on entry</text>

  <path class="flow" d="M465,118 L640,190" marker-end="url(#arrow)"/>
  <text class="edge mono" x="620" y="168" text-anchor="middle">on entry</text>

  <!-- Row 2: H11 -->
  <rect class="comp" x="310" y="302" width="200" height="46" rx="6"/>
  <text x="324" y="330"><tspan class="mono" font-weight="700" font-size="13" fill="#4c6ef5">H11</tspan><tspan font-size="13"> Context Manage</tspan></text>
  <path class="flow" d="M410,236 L410,302" marker-end="url(#arrow)"/>
  <text class="edge mono" x="420" y="276">Init &#8594; ContextManaged</text>

  <!-- Row 3: H04, H05 -->
  <rect class="comp" x="120" y="414" width="200" height="46" rx="6"/>
  <text x="134" y="442"><tspan class="mono" font-weight="700" font-size="13" fill="#4c6ef5">H04</tspan><tspan font-size="13"> Prompt Composer</tspan></text>

  <rect class="comp" x="500" y="414" width="200" height="46" rx="6"/>
  <text x="514" y="442"><tspan class="mono" font-weight="700" font-size="13" fill="#4c6ef5">H05</tspan><tspan font-size="13"> Tool Surface Builder</tspan></text>

  <!-- arrows H11 -> H04, H11 -> H05 (via H01 at ContextManaged -> PromptBuilt) -->
  <path class="flow" d="M370,348 L220,414" marker-end="url(#arrow)"/>
  <text class="edge mono" x="240" y="394" text-anchor="middle">ContextManaged</text>
  <text class="edge mono" x="240" y="407" text-anchor="middle">&#8594; PromptBuilt</text>

  <path class="flow" d="M450,348 L600,414" marker-end="url(#arrow)"/>
  <text class="edge mono" x="582" y="394" text-anchor="middle">ContextManaged</text>
  <text class="edge mono" x="582" y="407" text-anchor="middle">&#8594; PromptBuilt</text>

  <!-- H06, H07, H08, H09 row -->
  <rect class="comp" x="30" y="510" width="155" height="44" rx="6"/>
  <text x="44" y="537"><tspan class="mono" font-weight="700" font-size="12" fill="#4c6ef5">H06</tspan><tspan font-size="12"> Stream Demux</tspan></text>
  <text class="note" x="108" y="550" text-anchor="middle">ModelCalling &#8594; ModelCompleted</text>

  <rect class="comp" x="205" y="510" width="165" height="44" rx="6"/>
  <text x="219" y="537"><tspan class="mono" font-weight="700" font-size="12" fill="#4c6ef5">H07</tspan><tspan font-size="12"> Tool Call Resolver</tspan></text>
  <text class="note" x="288" y="550" text-anchor="middle">ModelCompleted</text>

  <rect class="comp" x="390" y="510" width="155" height="44" rx="6"/>
  <text x="404" y="537"><tspan class="mono" font-weight="700" font-size="12" fill="#4c6ef5">H08</tspan><tspan font-size="12"> Tool Dispatcher</tspan></text>
  <text class="note" x="468" y="550" text-anchor="middle">ToolDispatching</text>

  <rect class="comp" x="555" y="510" width="155" height="44" rx="6"/>
  <text x="569" y="537"><tspan class="mono" font-weight="700" font-size="12" fill="#4c6ef5">H09</tspan><tspan font-size="12"> Hook Pipeline</tspan></text>
  <text class="note" x="633" y="550" text-anchor="middle">lifecycle points</text>

  <!-- arrows from H01 to H06..H09 (direct, with label) -->
  <path class="flow" d="M340,118 C200,140 108,380 108,510" marker-end="url(#arrow)"/>
  <path class="flow" d="M360,118 C260,200 288,380 288,510" marker-end="url(#arrow)"/>
  <path class="flow" d="M440,118 C500,200 468,380 468,510" marker-end="url(#arrow)"/>
  <path class="flow" d="M460,118 C620,140 633,380 633,510" marker-end="url(#arrow)"/>

  <!-- H02 Step Recorder box (bottom-right, teal) -->
  <rect class="h02box" x="630" y="310" width="170" height="56" rx="8"/>
  <text x="644" y="335"><tspan class="mono" font-weight="700" font-size="13" fill="#1b9e9e">H02</tspan><tspan font-size="13"> Step Recorder</tspan></text>
  <text class="note" x="715" y="353" text-anchor="middle">called by every component</text>
  <text class="note" x="715" y="365" text-anchor="middle">(incl. H01 on each transition)</text>
</svg>
